<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN "　"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html>

    <head>
    </head>

    <body>
    
    <p><b>type属性の値</b></p>
    
    <ol>
    
        <li>1 (数字)</li>
        <li>a (アルファベット小文字)</li>
        <li>A (アルファベット大文字)</li>
        <li>i (ローマ数字小文字)</li>
        <li>I (ローマ数字大文字)</li>
        
    </ol>
    
    <p><b>表示例</b></p>
    
    <ol type="a">
    
        <li>アルファベット小文字</li>
        <li>2番目の項目</li>
        
    </ol>
    
    <ol type="A">
    
        <li>アルファベット大文字</li>
        <li>2番目の項目</li>
        
    </ol>
    
    <ol type="i">
    
        <li>ローマ数字小文字</li>
        <li>2番目の項目</li>
    
    </ol>
    
    <ol type="I">
    
        <li>ローマ数字大文字</li>
        <li>2番目の項目</li>
    
    </body>

</html>
