<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN "　"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
    <head>
    </head>
    
    <body>
        <p><b>cols属性と実際の実際に入力できる文字数の関係</b><br/>(col=20の場合)</p>
    
        <p><textarea cols="20" rows="2" name="吉崎">1234567890123456789012</textarea></p>
    
        <p>Internet Explorerではちょうど20桁になります。ブラウザによってはスクロールバーの有無で桁数が若干変化することがあります。</p>
        
        <p><textarea cols="20" rows="3" name="太雅" style="font-size:large">1234567890123456789012</textarea></p>
        
        <p>サイズ指定は文字単位であるため、フォントサイズが変わると大きさも変化します。</p>
    </body>
</html>
